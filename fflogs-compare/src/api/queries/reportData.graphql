query ReportData($code: String!, $fightIDs: [Int!]!, $startTime: Float!, $endTime: Float!) {
  reportData {
    report(code: $code) {
      title
      startTime
      endTime
      fights {
        id
        name
        kill
        difficulty
        lastPhaseAsAbsoluteIndex
      }
      events(
        fightIDs: $fightIDs
        startTime: $startTime
        endTime: $endTime
        dataType: DamageDone
      ) {
        data
        nextPageTimestamp
      }
    }
  }
}
