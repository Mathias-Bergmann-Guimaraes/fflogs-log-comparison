query ReportFightEvents($code: String!, $fightIDs: [Int!]!, $startTime: Float!, $endTime: Float!) {
  reportData {
    report(code: $code) {
      events(fightIDs: $fightIDs, startTime: $startTime, endTime: $endTime, dataType: DamageDone) {
        data
        nextPageTimestamp
      }
    }
  }
}
