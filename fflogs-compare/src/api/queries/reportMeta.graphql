query ReportMeta($code: String!, $fightIDs: [Int!]!) {
  reportData {
    report(code: $code) {
      title
      startTime
      endTime
      fights(fightIDs: $fightIDs) {
        id
        encounterID
        name
        kill
        startTime
        endTime
        lastPhaseAsAbsoluteIndex
      }
    }
  }
}
